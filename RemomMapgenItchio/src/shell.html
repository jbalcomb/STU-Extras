<!DOCTYPE html>
<!--
  Emscripten HTML shell template for MoM Scenario Editor.
  Custom dark-themed page with centered canvas, loading progress bar,
  WASM feature detection, and itch.io-friendly viewport.
  Powered by Claude.
-->
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MoM Scenario Editor</title>
    <style>
        /* Dark background matching the editor aesthetic. */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: #1a1a2e;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        /* Centered canvas container. */
        #canvas-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        canvas#canvas {
            display: block;
            border: 1px solid #333355;
            background-color: #0f0f23;
            max-width: 100%;
            max-height: 100%;
        }

        /* Loading overlay with progress bar. */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.4s ease-out;
        }

        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #loading-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: #c0c0e0;
            letter-spacing: 0.05em;
        }

        #loading-status {
            font-size: 0.9rem;
            color: #8888aa;
            margin-bottom: 0.75rem;
        }

        #progress-bar-container {
            width: 320px;
            height: 8px;
            background-color: #0f0f23;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #333355;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #4a4a8a, #7070c0);
            border-radius: 4px;
            transition: width 0.2s ease-out;
        }

        /* Error overlay for missing WASM support. */
        #error-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a2e;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        #error-overlay.visible {
            display: flex;
        }

        #error-message {
            font-size: 1.1rem;
            color: #cc6666;
            text-align: center;
            max-width: 480px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <!-- Fallback for browsers with JavaScript disabled. -->
    <noscript>
        <div style="position:fixed;top:0;left:0;width:100%;height:100%;background-color:#1a1a2e;display:flex;justify-content:center;align-items:center;z-index:300;">
            <div style="font-size:1.1rem;color:#cc6666;text-align:center;max-width:480px;line-height:1.6;font-family:sans-serif;">
                <strong>JavaScript Required</strong><br><br>
                This application requires JavaScript to run. Please enable
                JavaScript in your browser settings and reload the page.
            </div>
        </div>
    </noscript>

    <!-- Error overlay shown if WebAssembly is not supported. -->
    <div id="error-overlay">
        <div id="error-message">
            <strong>WebAssembly Required</strong><br><br>
            This application requires WebAssembly. Please use a modern browser
            (Chrome 57+, Firefox 52+, Safari 11+, Edge 16+).
        </div>
    </div>

    <!-- Loading overlay with progress bar. -->
    <div id="loading-overlay">
        <div id="loading-title">MoM Scenario Editor</div>
        <div id="loading-status">Loading...</div>
        <div id="progress-bar-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <!-- Canvas container. The canvas element is used by Emscripten/SDL2. -->
    <div id="canvas-container">
        <canvas id="canvas" width="1280" height="720" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    </div>

    <script>
        // WASM feature detection — show error and hide canvas if unsupported.
        // Powered by Claude.
        if (typeof WebAssembly === 'undefined' ||
            typeof WebAssembly.instantiate !== 'function') {
            document.getElementById('error-overlay').classList.add('visible');
            document.getElementById('loading-overlay').style.display = 'none';
            document.getElementById('canvas-container').style.display = 'none';
        }

        // Emscripten Module configuration.
        // Powered by Claude.
        var Module = {
            canvas: (function() {
                return document.getElementById('canvas');
            })(),

            // Update loading progress bar.
            // Powered by Claude.
            setStatus: function(text) {
                var statusEl = document.getElementById('loading-status');
                if (statusEl) {
                    statusEl.innerText = text;
                }

                // Parse progress from Emscripten status strings like
                // "Downloading data... (3/5)"
                if (text) {
                    var match = text.match(/(\d+)\/(\d+)/);
                    if (match) {
                        var current = parseInt(match[1], 10);
                        var total = parseInt(match[2], 10);
                        var pct = Math.round((current / total) * 100);
                        var bar = document.getElementById('progress-bar');
                        if (bar) bar.style.width = pct + '%';
                    }
                }

                // Hide loading overlay when status is empty (loading complete).
                if (!text || text === '') {
                    var overlay = document.getElementById('loading-overlay');
                    if (overlay) {
                        var bar = document.getElementById('progress-bar');
                        if (bar) bar.style.width = '100%';
                        setTimeout(function() {
                            overlay.classList.add('hidden');
                        }, 300);
                    }
                }
            },

            // Log total memory usage on start.
            // Powered by Claude.
            onRuntimeInitialized: function() {
                console.log('MoM Scenario Editor WASM runtime initialized.');
            }
        };
    </script>

    {{{ SCRIPT }}}

</body>
</html>
