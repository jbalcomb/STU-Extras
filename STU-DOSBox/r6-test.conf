# r6-test.conf -- dedicated DOSBox conf for the R6 overlay-resolver
# smoke test (r6-overlay-resolver-test.sh).  Launches WIZARDS.EXE
# directly so we can exercise overlay-buffer code paths without going
# through MAGIC.EXE first.

[sdl]
fullscreen = false
output     = surface

[dosbox]
machine  = svga_s3
memsize  = 16

[cpu]
# Pin core=normal so CPU_Core_Normal_Run drives the per-instruction hook.
core = normal

[autoexec]
@echo off
mount c /home/jbalcomb/STU_DBWD/MoM131
c:
WIZARDS.EXE
